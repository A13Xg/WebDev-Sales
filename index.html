<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Internal dashboard for managing client demo sites.">
  <title>Client Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap">
  <style>
    /* =====================
       CSS Custom Properties
       ===================== */
    :root {
      /* Spacing (8-point scale, 4px minimum) */
      --space-xs: 4px;
      --space-sm: 8px;
      --space-md: 16px;
      --space-lg: 24px;
      --space-xl: 32px;
      --space-2xl: 48px;

      /* Typography */
      --font-family-base: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      --font-size-body: 14px;
      --font-size-label: 12px;
      --font-size-heading: 16px;
      --font-size-display: 24px;
      --font-weight-regular: 400;
      --font-weight-bold: 600;
      --line-height-body: 1.5;
      --line-height-heading: 1.3;

      /* Colors — dark theme */
      --color-bg: #0f1419;
      --color-surface: #1a1f2e;
      --color-accent: #3b82f6;
      --color-text-primary: #e5e7eb;
      --color-text-secondary: #9ca3af;
      --color-border: #374151;
      --color-status-pending: #f59e0b;
      --color-status-live: #10b981;
      --color-status-archived: #6b7280;
      --color-status-error: #ef4444;

      /* Modal */
      --color-overlay: rgba(0, 0, 0, 0.7);
      --color-code-bg: #0d1117;
      --modal-max-width: 480px;
    }

    /* =====================
       Reset & Base
       ===================== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: var(--color-bg);
      color: var(--color-text-primary);
      font-family: var(--font-family-base);
      font-size: var(--font-size-body);
      line-height: var(--line-height-body);
    }

    /* =====================
       Layout
       ===================== */
    header {
      padding: var(--space-2xl) var(--space-lg) var(--space-xl);
      text-align: center;
    }

    h1 {
      font-size: var(--font-size-display);
      font-weight: var(--font-weight-bold);
      color: var(--color-text-primary);
    }

    #client-grid {
      max-width: 1200px;
      margin: 0 auto;
      padding: var(--space-2xl) var(--space-lg);
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: var(--space-xl);
    }

    /* =====================
       Client Card
       ===================== */
    .client-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      padding: var(--space-md);
      display: flex;
      flex-direction: column;
      gap: var(--space-md);
      border-radius: 4px;
    }

    .card-title {
      font-size: var(--font-size-heading);
      font-weight: var(--font-weight-bold);
      color: var(--color-text-primary);
      line-height: var(--line-height-heading);
      word-break: break-word;
      text-decoration: none;
      display: block;
    }

    .card-title:hover {
      color: var(--color-accent);
    }

    .card-meta {
      font-size: var(--font-size-label);
      color: var(--color-text-secondary);
    }

    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: var(--space-md);
      margin-top: auto;
    }

    /* =====================
       Status Badge
       ===================== */
    .status-badge {
      display: inline-block;
      padding: var(--space-xs) var(--space-sm);
      font-size: var(--font-size-label);
      font-weight: var(--font-weight-bold);
      border-radius: 4px;
      color: white;
      text-transform: lowercase;
    }

    .status-pending {
      background-color: var(--color-status-pending);
    }

    .status-live {
      background-color: var(--color-status-live);
    }

    .status-archived {
      background-color: var(--color-status-archived);
    }

    .status-error {
      background-color: var(--color-status-error);
    }

    /* =====================
       Copy Button
       ===================== */
    .copy-btn {
      background-color: var(--color-accent);
      color: white;
      border: none;
      padding: var(--space-sm) var(--space-md);
      font-size: var(--font-size-body);
      font-weight: var(--font-weight-bold);
      font-family: var(--font-family-base);
      cursor: pointer;
      min-height: 44px;
      min-width: 44px;
      border-radius: 4px;
      transition: background-color 0.15s ease;
    }

    .copy-btn:hover {
      background-color: #2563eb;
    }

    .copy-btn:focus {
      outline: 2px solid var(--color-accent);
      outline-offset: 2px;
    }

    /* =====================
       Access Gate
       ===================== */
    #gate {
      display: none;
      min-height: 100vh;
      align-items: center;
      justify-content: center;
      background-color: var(--color-bg);
    }

    #gate.visible {
      display: flex;
    }

    .gate-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: 6px;
      padding: var(--space-2xl);
      width: 100%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      gap: var(--space-md);
    }

    .gate-title {
      font-size: var(--font-size-display);
      font-weight: var(--font-weight-bold);
      color: var(--color-text-primary);
      text-align: center;
    }

    .gate-label {
      font-size: var(--font-size-label);
      color: var(--color-text-secondary);
      text-align: center;
    }

    .gate-input {
      background: var(--color-bg);
      border: 1px solid var(--color-border);
      border-radius: 4px;
      color: var(--color-text-primary);
      font-family: var(--font-family-base);
      font-size: var(--font-size-body);
      padding: var(--space-sm) var(--space-md);
      width: 100%;
      min-height: 44px;
      outline: none;
    }

    .gate-input:focus {
      border-color: var(--color-accent);
    }

    .gate-submit {
      background-color: var(--color-accent);
      border: none;
      border-radius: 4px;
      color: white;
      cursor: pointer;
      font-family: var(--font-family-base);
      font-size: var(--font-size-body);
      font-weight: var(--font-weight-bold);
      min-height: 44px;
      padding: var(--space-sm) var(--space-md);
      transition: background-color 0.15s ease;
      width: 100%;
    }

    .gate-submit:hover {
      background-color: #2563eb;
    }

    .gate-error {
      color: #ef4444;
      font-size: var(--font-size-label);
      text-align: center;
      min-height: 16px;
    }

    /* =====================
       Empty State
       ===================== */
    .empty-state {
      text-align: center;
      padding: var(--space-2xl);
    }

    .empty-state h2 {
      font-size: var(--font-size-heading);
      color: var(--color-text-primary);
      margin-bottom: var(--space-md);
      font-weight: var(--font-weight-bold);
    }

    .empty-state p {
      color: var(--color-text-secondary);
    }

    /* =====================
       Add Client Button
       ===================== */
    .add-client-btn {
      background-color: var(--color-accent);
      border: none;
      border-radius: 4px;
      color: white;
      cursor: pointer;
      font-family: var(--font-family-base);
      font-size: var(--font-size-body);
      font-weight: var(--font-weight-bold);
      min-height: 44px;
      padding: var(--space-sm) var(--space-md);
      transition: background-color 0.15s ease;
    }

    .add-client-btn:hover {
      background-color: #2563eb;
    }

    .add-client-btn:focus {
      outline: 2px solid var(--color-accent);
      outline-offset: 2px;
    }

    /* =====================
       Modal Overlay
       ===================== */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background-color: var(--color-overlay);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: var(--space-md);
    }

    .modal-overlay.open {
      display: flex;
    }

    .modal-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: 6px;
      padding: var(--space-2xl);
      width: 100%;
      max-width: var(--modal-max-width);
      max-height: 90vh;
      overflow-y: auto;
      position: relative;
      display: flex;
      flex-direction: column;
      gap: var(--space-lg);
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .modal-title {
      font-size: var(--font-size-display);
      font-weight: var(--font-weight-bold);
      color: var(--color-text-primary);
    }

    .modal-close {
      background: none;
      border: none;
      color: var(--color-text-secondary);
      cursor: pointer;
      font-size: 20px;
      line-height: 1;
      padding: var(--space-xs);
      min-height: 44px;
      min-width: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
    }

    .modal-close:hover {
      color: var(--color-text-primary);
      background-color: var(--color-border);
    }

    .modal-close:focus {
      outline: 2px solid var(--color-accent);
      outline-offset: 2px;
    }

    /* =====================
       Form Fields
       ===================== */
    .form-fields {
      display: flex;
      flex-direction: column;
      gap: var(--space-md);
    }

    .form-field {
      display: flex;
      flex-direction: column;
      gap: var(--space-xs);
    }

    .form-label {
      font-size: var(--font-size-label);
      font-weight: var(--font-weight-bold);
      color: var(--color-text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .form-label .required-mark {
      color: var(--color-status-error);
      margin-left: 2px;
    }

    .form-input,
    .form-textarea {
      background: var(--color-bg);
      border: 1px solid var(--color-border);
      border-radius: 4px;
      color: var(--color-text-primary);
      font-family: var(--font-family-base);
      font-size: var(--font-size-body);
      padding: var(--space-sm) var(--space-md);
      width: 100%;
      min-height: 44px;
      outline: none;
    }

    .form-input:focus,
    .form-textarea:focus {
      border-color: var(--color-accent);
    }

    .form-input.input-error,
    .form-textarea.input-error {
      border-color: var(--color-status-error);
    }

    .form-textarea {
      min-height: 80px;
      resize: vertical;
    }

    .form-error {
      color: var(--color-status-error);
      font-size: var(--font-size-label);
      min-height: 16px;
    }

    .slug-row {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
    }

    .slug-row .form-input {
      flex: 1;
    }

    #slug-edit-toggle {
      color: var(--color-accent);
      font-size: var(--font-size-label);
      cursor: pointer;
      white-space: nowrap;
      text-decoration: underline;
      background: none;
      border: none;
      padding: 0;
      font-family: var(--font-family-base);
    }

    #slug-edit-toggle:focus {
      outline: 2px solid var(--color-accent);
      outline-offset: 2px;
    }

    /* Advanced section */
    details.advanced-section {
      border-top: 1px solid var(--color-border);
      padding-top: var(--space-md);
    }

    details.advanced-section summary {
      color: var(--color-text-secondary);
      cursor: pointer;
      font-size: var(--font-size-label);
      font-weight: var(--font-weight-bold);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      list-style: none;
      display: flex;
      align-items: center;
      gap: var(--space-xs);
      margin-bottom: var(--space-md);
    }

    details.advanced-section summary::-webkit-details-marker {
      display: none;
    }

    details.advanced-section[open] summary::before {
      content: '▾';
    }

    details.advanced-section:not([open]) summary::before {
      content: '▸';
    }

    .form-actions {
      display: flex;
      gap: var(--space-sm);
      justify-content: flex-end;
      padding-top: var(--space-md);
      border-top: 1px solid var(--color-border);
    }

    .btn-primary {
      background-color: var(--color-accent);
      border: none;
      border-radius: 4px;
      color: white;
      cursor: pointer;
      font-family: var(--font-family-base);
      font-size: var(--font-size-body);
      font-weight: var(--font-weight-bold);
      min-height: 44px;
      padding: var(--space-sm) var(--space-lg);
      transition: background-color 0.15s ease;
    }

    .btn-primary:hover {
      background-color: #2563eb;
    }

    .btn-primary:focus {
      outline: 2px solid var(--color-accent);
      outline-offset: 2px;
    }

    .btn-secondary {
      background-color: transparent;
      border: 1px solid var(--color-border);
      border-radius: 4px;
      color: var(--color-text-secondary);
      cursor: pointer;
      font-family: var(--font-family-base);
      font-size: var(--font-size-body);
      font-weight: var(--font-weight-bold);
      min-height: 44px;
      padding: var(--space-sm) var(--space-md);
      transition: border-color 0.15s ease, color 0.15s ease;
    }

    .btn-secondary:hover {
      border-color: var(--color-text-secondary);
      color: var(--color-text-primary);
    }

    .btn-secondary:focus {
      outline: 2px solid var(--color-accent);
      outline-offset: 2px;
    }

    /* =====================
       Output Panel
       ===================== */
    .output-panel {
      display: flex;
      flex-direction: column;
      gap: var(--space-lg);
    }

    .output-json {
      background: var(--color-code-bg);
      border: 1px solid var(--color-border);
      border-radius: 4px;
      padding: var(--space-md);
      overflow-x: auto;
      font-family: 'Courier New', Courier, monospace;
      font-size: var(--font-size-label);
      line-height: 1.6;
      color: var(--color-text-primary);
      white-space: pre;
    }

    .output-actions {
      display: flex;
      flex-direction: column;
      gap: var(--space-sm);
    }

    .output-actions-row {
      display: flex;
      gap: var(--space-sm);
      align-items: center;
      flex-wrap: wrap;
    }

    .pipeline-warning {
      color: var(--color-status-pending);
      font-size: var(--font-size-label);
    }

    .pipeline-unsupported-note {
      color: var(--color-text-secondary);
      font-size: var(--font-size-label);
    }

    .output-add-another {
      color: var(--color-accent);
      font-size: var(--font-size-body);
      cursor: pointer;
      text-align: center;
      text-decoration: underline;
      background: none;
      border: none;
      font-family: var(--font-family-base);
      padding: 0;
      display: block;
      width: 100%;
    }

    .output-add-another:focus {
      outline: 2px solid var(--color-accent);
      outline-offset: 2px;
    }

    /* =====================
       Responsive
       ===================== */
    @media (max-width: 640px) {
      #client-grid {
        grid-template-columns: 1fr;
      }
      main {
        padding: var(--space-lg) var(--space-md);
      }
    }
  </style>
</head>
<body>
  <div id="gate" role="main" aria-label="Access gate">
    <div class="gate-card">
      <h1 class="gate-title">Client Dashboard</h1>
      <p class="gate-label">Enter access code to continue</p>
      <form id="gate-form" autocomplete="off">
        <input id="gate-input" class="gate-input" type="password" placeholder="Access code" aria-label="Access code" required>
        <div style="height:var(--space-sm)"></div>
        <button type="submit" class="gate-submit">Enter</button>
        <p id="gate-error" class="gate-error" aria-live="polite"></p>
      </form>
    </div>
  </div>

  <div id="dashboard" style="display:none">
    <header style="display:flex;align-items:center;justify-content:center;position:relative;padding:var(--space-2xl) var(--space-lg) var(--space-xl);">
      <h1>Client Dashboard</h1>
      <button id="add-client-btn" class="add-client-btn" style="position:absolute;right:var(--space-lg);display:none;" aria-haspopup="dialog">
        Add Client
      </button>
    </header>
    <main id="client-grid">
      <!-- Cards rendered here by JS from clients.json -->
    </main>
  </div>

  <!-- Add Client Modal -->
  <div id="add-client-modal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-card" id="modal-card">
      <div class="modal-header">
        <h2 class="modal-title" id="modal-title">Add Client</h2>
        <button class="modal-close" id="modal-close-btn" aria-label="Close modal">✕</button>
      </div>
      <!-- Form view and output panel inserted in Tasks 3 and 5 -->
      <div id="modal-form-view">
        <form id="intake-form" autocomplete="off" novalidate>
          <div class="form-fields">
            <!-- Business Name -->
            <div class="form-field">
              <label class="form-label" for="field-name">Business Name <span class="required-mark">*</span></label>
              <input id="field-name" class="form-input" type="text" required autocomplete="off">
              <p class="form-error" id="error-name" aria-live="polite"></p>
            </div>

            <!-- Slug -->
            <div class="form-field">
              <label class="form-label" for="field-slug">Slug <span class="required-mark">*</span></label>
              <div class="slug-row">
                <input id="field-slug" class="form-input" type="text" required readonly aria-describedby="error-slug">
                <button type="button" id="slug-edit-toggle">Edit</button>
              </div>
              <p class="form-error" id="error-slug" aria-live="polite"></p>
            </div>

            <!-- Industry -->
            <div class="form-field">
              <label class="form-label" for="field-industry">Industry <span class="required-mark">*</span></label>
              <input id="field-industry" class="form-input" type="text" placeholder="e.g. Home Services, Food &amp; Beverage" required>
              <p class="form-error" id="error-industry" aria-live="polite"></p>
            </div>

            <!-- Business Type -->
            <div class="form-field">
              <label class="form-label" for="field-business-type">Business Type <span class="required-mark">*</span></label>
              <input id="field-business-type" class="form-input" type="text" placeholder="e.g. coffee roaster, plumber" required>
              <p class="form-error" id="error-business-type" aria-live="polite"></p>
            </div>

            <!-- Domain -->
            <div class="form-field">
              <label class="form-label" for="field-domain">Domain</label>
              <input id="field-domain" class="form-input" type="url" placeholder="https://example.com — optional">
              <p class="form-error" id="error-domain" aria-live="polite"></p>
            </div>

            <!-- Notes -->
            <div class="form-field">
              <label class="form-label" for="field-notes">Notes</label>
              <textarea id="field-notes" class="form-textarea" placeholder="Research direction, services, tone, colors — optional"></textarea>
            </div>

            <!-- Advanced -->
            <details class="advanced-section" id="advanced-section">
              <summary>Advanced options</summary>
              <div class="form-fields">
                <div class="form-field">
                  <label class="form-label" for="field-services">Services</label>
                  <textarea id="field-services" class="form-textarea" placeholder="Drain clearing, pipe repair, emergency calls — optional"></textarea>
                </div>
                <div class="form-field">
                  <label class="form-label" for="field-tone">Tone</label>
                  <input id="field-tone" class="form-input" type="text" placeholder="trust, authoritative, warm — optional">
                </div>
                <div class="form-field">
                  <label class="form-label" for="field-color-hint">Color Hint</label>
                  <input id="field-color-hint" class="form-input" type="text" placeholder="#1a3c5e or &quot;navy and white&quot; — optional">
                </div>
              </div>
            </details>
          </div>

          <div class="form-actions">
            <button type="button" class="btn-secondary" id="modal-cancel-btn">Cancel</button>
            <button type="submit" class="btn-primary">Generate Entry</button>
          </div>
        </form>
      </div>
      <div id="modal-output-view" style="display:none;">
        <div class="output-panel">
          <div>
            <p style="font-size:var(--font-size-label);color:var(--color-text-secondary);margin-bottom:var(--space-sm);">Generated entry — add to your intake file:</p>
            <pre class="output-json"><code id="output-json-block"></code></pre>
          </div>
          <div class="output-actions">
            <div class="output-actions-row">
              <button id="btn-copy-json" class="btn-primary" style="flex:0 0 auto;">Copy JSON</button>
              <button id="btn-download" class="btn-secondary" style="flex:0 0 auto;">Download intake.json</button>
            </div>
            <div class="output-actions-row" id="pipeline-row">
              <button id="btn-send-pipeline" class="btn-secondary" style="flex:0 0 auto;">Send to Pipeline</button>
              <span class="pipeline-warning" id="pipeline-warning" style="display:none;">
                ⚠ This overwrites the current intake file
              </span>
              <span class="pipeline-unsupported-note" id="pipeline-unsupported-note" style="display:none;">
                Use Download on this browser — File System Access not supported.
              </span>
            </div>
          </div>
          <button type="button" class="output-add-another" id="add-another-link">+ Add Another</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    var BASE_PATH = '/WebDev-Sales/';

    /**
     * escapeHtml — XSS prevention for dynamic content insertion.
     * Uses DOM textContent assignment which the browser HTML-encodes automatically.
     * Apply to ALL dynamic fields from clients.json before template insertion.
     */
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = String(text);
      return div.innerHTML;
    }

    function getDemoUrl(slug) {
      return './' + slug + '/';
    }

    /**
     * renderClientCards — build card DOM nodes for each client entry.
     * Uses DOM APIs throughout to avoid XSS via attribute or JS-string interpolation.
     */
    function renderClientCards(clients) {
      var VALID_STATUSES = ['pending', 'live', 'archived', 'error'];
      var grid = document.getElementById('client-grid');
      grid.innerHTML = '';

      clients.forEach(function(client) {
        var safeStatus = VALID_STATUSES.indexOf(client.status) !== -1 ? client.status : 'unknown';

        var article = document.createElement('article');
        article.className = 'client-card';

        var title = document.createElement('a');
        title.className = 'card-title';
        title.textContent = client.businessName;
        title.href = getDemoUrl(client.slug);
        title.target = '_blank';
        title.rel = 'noopener noreferrer';

        var meta = document.createElement('p');
        meta.className = 'card-meta';
        meta.textContent = client.industry + ' • ' + client.businessType;

        var footer = document.createElement('div');
        footer.className = 'card-footer';

        var badge = document.createElement('span');
        badge.className = 'status-badge status-' + safeStatus;
        badge.textContent = client.status;

        var btn = document.createElement('button');
        btn.className = 'copy-btn';
        btn.textContent = 'Copy';
        btn.title = 'Copy demo URL to clipboard';
        btn.addEventListener('click', (function(slug) {
          return function(evt) { copyDemoUrl(slug, evt); };
        }(client.slug)));

        footer.appendChild(badge);
        footer.appendChild(btn);
        article.appendChild(title);
        article.appendChild(meta);
        if (client.errorMessage && typeof client.errorMessage === 'string' && client.errorMessage.trim()) {
          var errorSubtitle = document.createElement('p');
          errorSubtitle.className = 'card-meta';
          errorSubtitle.textContent = client.errorMessage;
          article.appendChild(errorSubtitle);
        }
        article.appendChild(footer);
        grid.appendChild(article);
      });
    }

    /**
     * showEmptyState — display a message when no clients are found or on load error.
     */
    function showEmptyState(message) {
      const grid = document.getElementById('client-grid');
      grid.innerHTML = '<div class="empty-state" style="grid-column: 1 / -1;">'
        + '<h2>No clients yet</h2>'
        + '<p>' + (message || 'Add a new client to clients.json to see generated sites here. Refresh the page to reload.') + '</p>'
        + '</div>';
    }

    /**
     * copyDemoUrl — write /slug/ to clipboard; provide visual feedback on the button.
     */
    function copyDemoUrl(slug, evt) {
      var btn = evt && evt.target ? evt.target : null;
      var url = window.location.origin + BASE_PATH + slug + '/';

      navigator.clipboard.writeText(url).then(function() {
        console.log('Copied: ' + url);
        if (btn) {
          btn.textContent = 'Copied!';
          setTimeout(function() { btn.textContent = 'Copy'; }, 2000);
        }
      }).catch(function(err) {
        console.error('Copy failed:', err);
        alert('Copy failed. Demo URL: ' + url);
      });
    }

    /**
     * loadClients — fetch clients.json and trigger render or empty state.
     * Uses relative path so it works both locally (http.server) and on GitHub Pages.
     */
    async function loadClients() {
      try {
        const response = await fetch('./clients.json', { cache: 'no-store' });
        if (!response.ok) {
          throw new Error('HTTP ' + response.status);
        }

        const data = await response.json();

        if (!Array.isArray(data.clients)) {
          throw new Error('Invalid schema: data.clients is not an array');
        }

        // Phase 1: show ALL entries regardless of status (D-06)
        const clients = data.clients;

        if (clients.length === 0) {
          showEmptyState();
        } else {
          renderClientCards(clients);
        }
      } catch (err) {
        console.error('Failed to load clients:', err);
        showEmptyState('Could not load client list. Check that clients.json is present and valid.');
      }
    }

    async function hexDigest(text) {
      const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
      return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    // =====================
    // Modal: open / close / focus trap
    // =====================

    function openAddClientModal() {
      var modal = document.getElementById('add-client-modal');
      var formView = document.getElementById('modal-form-view');
      var outputView = document.getElementById('modal-output-view');
      var form = document.getElementById('intake-form');

      // Reset to form view and clear values
      formView.style.display = '';
      outputView.style.display = 'none';
      form.reset();
      // Re-lock slug to readonly (auto-generation mode)
      var slugInput = document.getElementById('field-slug');
      if (slugInput) {
        slugInput.readOnly = true;
        slugInput.value = '';
      }
      // Clear any validation errors
      document.querySelectorAll('.form-error').forEach(function(el) { el.textContent = ''; });
      document.querySelectorAll('.form-input, .form-textarea').forEach(function(el) {
        el.classList.remove('input-error');
      });

      initSlugGeneration();

      modal.classList.add('open');
      // Focus first required field
      var first = document.getElementById('field-name');
      if (first) first.focus();

      modal.addEventListener('keydown', trapFocus);
    }

    function closeAddClientModal() {
      var modal = document.getElementById('add-client-modal');
      modal.classList.remove('open');
      modal.removeEventListener('keydown', trapFocus);
      // Return focus to the trigger button
      var trigger = document.getElementById('add-client-btn');
      if (trigger) trigger.focus();
    }

    function trapFocus(e) {
      if (e.key !== 'Tab' && e.key !== 'Escape') return;
      if (e.key === 'Escape') {
        e.preventDefault();
        closeAddClientModal();
        return;
      }
      var modal = document.getElementById('modal-card');
      var focusable = Array.from(modal.querySelectorAll(
        'button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])'
      )).filter(function(el) { return !el.disabled && el.offsetParent !== null; });
      if (focusable.length === 0) return;
      var first = focusable[0];
      var last = focusable[focusable.length - 1];
      if (e.shiftKey) {
        if (document.activeElement === first) {
          e.preventDefault();
          last.focus();
        }
      } else {
        if (document.activeElement === last) {
          e.preventDefault();
          first.focus();
        }
      }
    }

    function wireAddClientModal() {
      var addClientBtn = document.getElementById('add-client-btn');
      if (!addClientBtn) return;
      addClientBtn.style.display = '';
      addClientBtn.addEventListener('click', openAddClientModal);
      document.getElementById('modal-close-btn').addEventListener('click', closeAddClientModal);
      document.getElementById('modal-cancel-btn').addEventListener('click', closeAddClientModal);
      document.getElementById('add-client-modal').addEventListener('click', function(e) {
        if (e.target === e.currentTarget) closeAddClientModal();
      });
      initIntakeForm();
    }

    // =====================
    // Slug generation
    // =====================

    function generateSlug(text) {
      return text
        .toLowerCase()
        .replace(/\s+/g, '-')
        .replace(/[^a-z0-9-]/g, '')
        .replace(/-+/g, '-')
        .replace(/^-|-$/g, '');
    }

    function initSlugGeneration() {
      var nameInput = document.getElementById('field-name');
      var slugInput = document.getElementById('field-slug');
      var editToggle = document.getElementById('slug-edit-toggle');
      var slugManuallyEdited = false;

      function updateSlug() {
        if (!slugManuallyEdited) {
          slugInput.value = generateSlug(nameInput.value);
        }
      }

      nameInput.addEventListener('input', updateSlug);

      editToggle.addEventListener('click', function() {
        if (slugInput.readOnly) {
          slugInput.readOnly = false;
          slugInput.focus();
          editToggle.textContent = 'Auto';
          slugManuallyEdited = true;
        } else {
          slugInput.readOnly = true;
          editToggle.textContent = 'Edit';
          slugManuallyEdited = false;
          updateSlug(); // re-sync from name
        }
      });
    }

    function initIntakeForm() {}

    async function initDashboard() {
      let cfg;
      try {
        const res = await fetch('./access-config.json', { cache: 'no-store' });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        cfg = await res.json();
      } catch (err) {
        console.error('access-config.json load failed:', err);
        document.getElementById('gate').classList.add('visible');
        return;
      }
      const stored = sessionStorage.getItem('dashboard-auth');

      if (stored === cfg.hash) {
        document.getElementById('dashboard').style.display = '';
        loadClients();
        wireAddClientModal();
        return;
      }

      const gate = document.getElementById('gate');
      gate.classList.add('visible');

      document.getElementById('gate-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        const input = document.getElementById('gate-input');
        const errorEl = document.getElementById('gate-error');
        const digest = await hexDigest(input.value);
        if (digest === cfg.hash) {
          sessionStorage.setItem('dashboard-auth', digest);
          gate.classList.remove('visible');
          gate.style.display = 'none';
          document.getElementById('dashboard').style.display = '';
          loadClients();
          wireAddClientModal();
        } else {
          errorEl.textContent = 'Incorrect access code.';
          input.value = '';
          input.focus();
        }
      });
    }

    document.addEventListener('DOMContentLoaded', initDashboard);
  </script>
</body>
