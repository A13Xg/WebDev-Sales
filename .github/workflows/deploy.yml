name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Stage public files
        run: |
          mkdir _site
          # Root files that belong on Pages
          cp index.html 404.html .nojekyll clients.json _site/
          # Client demo site directories (slug/index.html pattern)
          # Excludes dotdirs (.git, .github, .claude), _pipeline, and _site itself
          for dir in */; do
            case "$dir" in
              _site/|_pipeline/) ;;
              *) cp -r "$dir" _site/ ;;
            esac
          done

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
